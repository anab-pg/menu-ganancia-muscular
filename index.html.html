function calcTMB(sexo,peso,altura,edad){
  const b=10*peso+6.25*altura-5*edad;
  return sexo==="hombre"?b+5:b-161;
}
// TDEE con horas de deporte:
// Base sedentaria (1.2) = NEAT mínimo para funciones básicas del día
// Cada hora de deporte/semana aporta aprox. 35 kcal adicionales / kcal de TMB,
// equivalente a sumar un 3.5% del TMB por hora a la semana.
// Factor resultante: 1.2 (0 h) → 1.375 (5 h) → 1.55 (10 h) → 1.9 (20 h)
function calcTDEE(tmb,horasDeporte,trabajoPie){
  const extra = trabajoPie ? 0.1 : 0;
  return tmb*(1.2 + extra + Math.min(horasDeporte*0.035, 0.7));
}
function calcIMC(peso,alturaCm){const m=alturaCm/100;return peso/(m*m);}
function clasifIMC(imc){
  if(imc<18.5)return{t:"Por debajo de tu rango habitual",c:"info"};
  if(imc<25)return{t:"Dentro del rango saludable ✨",c:"bien"};
  if(imc<30)return{t:"Algo por encima del rango saludable",c:"alerta"};
  return{t:"Bastante por encima del rango saludable",c:"alerta"};
}
function calcGrasa({sexo,cintura,cadera,cuello,alturaCm}){
  if(sexo==="hombre"){const d=cintura-cuello;if(d<=0)return null;return 495/(1.0324-0.19077*Math.log10(d)+0.15456*Math.log10(alturaCm))-450;}
  const s=cintura+cadera-cuello;if(s<=0)return null;
  return 495/(1.29579-0.35004*Math.log10(s)+0.221*Math.log10(alturaCm))-450;
}
function clasifGrasa(sexo,pct){
  const t=sexo==="hombre"
    ?[[0,6,"Muy baja"],[6,14,"Atlética 🏆"],[14,18,"En forma 💪"],[18,25,"Aceptable"],[25,99,"Alta"]]
    :[[0,14,"Muy baja"],[14,21,"Atlética 🏆"],[21,25,"En forma 💪"],[25,32,"Aceptable"],[32,99,"Alta"]];
  return t.find(([a,b])=>pct>=a&&pct<b)?.[2]??"—";
}
function calcICC(c,ca){return c/ca;}
function clasifICC(sexo,icc){
  return icc<=(sexo==="hombre"?0.9:0.85)?{t:"Distribución saludable de la grasa ✨",c:"bien"}:{t:"Hay algo de grasa abdominal a vigilar",c:"alerta"};
}
function simbolo(actual,anterior){
  if(anterior==null)return"→";
  const d=actual-anterior;
  if(Math.abs(d)<0.3)return"→";
  return d<0?"↓":"↑";
}
function perdStr(v){return v<1?`${Math.round(v*1000)} g`:`${v.toFixed(2)} kg`;}

async function generarDiaConIA(diaNombre,macros,kcalObj,sels,habitos,actDia){
  const porRol={proteina:[],carbohidrato:[],grasa:[],verdura:[],fruta:[]};
  GRUPOS.forEach(g=>g.alimentos.forEach(a=>{
    if(sels[a.id])porRol[g.rol]?.push(a.n||a.nombre);
  }));

  const restr=[];
  if(habitos.veggie)restr.push("vegetariana");
  if(habitos.noCarne)restr.push("sin carne");
  if(habitos.noPescado)restr.push("sin pescado");
  if(habitos.sinLacteos)restr.push("sin lácteos");
  if(habitos.libre)restr.push(habitos.libre);

  const actStr=actDia&&actDia.intens!=="ninguna"
    ?`Hoy hay entreno ${actDia.intens}${actDia.horas?` de ${actDia.horas}h`:""}. Añade algo más de hidrato en la comida/cena previa o posterior al entreno.`
    :"Día de descanso. Puedes bajar un poco los hidratos.";

  const kcalStr=Object.entries(REPARTO_KCAL).map(([c,p])=>
    `${COMIDA_LABEL[c]}: ${Math.round(kcalObj*p)} kcal, ${Math.round(macros.proteina*p)}g prot, ${Math.round(macros.carbohidrato*p)}g carbo, ${Math.round(macros.grasa*p)}g grasa`
  ).join("\n");

  const sys=`Eres cocinero mediterráneo y nutricionista. Respondes SOLO con JSON válido, sin markdown, sin texto extra.
Formato: {"desayuno":[...],"almuerzo":[...],"comida":[...],"merienda":[...],"cena":[...]}
Cada comida tiene 2 opciones: [{"n":"Nombre","desc":"Frase apetecible ≤15 palabras","i":[{"n":"Alimento","g":80,"r":"seco/cocinado/tal cual","m":"Xg proteína"}]}]
REGLAS:
- Desayuno/almuerzo: avena, tostadas, yogur, fruta, huevo. NUNCA carne ni pescado.
- Merienda: snack ligero (fruta, yogur, frutos secos).
- Comida: proteína + hidrato + verdura.
- Cena: proteína + verdura (pocos hidratos salvo día de entreno).
- NO repetir la misma proteína principal en el mismo día.
- desc: UNA frase que dé ganas de comerlo, no liste ingredientes.
- 3-4 ingredientes por plato.`;

  const msg=`Día: ${diaNombre}. ${actStr}
Proteínas disponibles: ${porRol.proteina.join(", ")||"huevo, legumbres"}
Carbohidratos: ${porRol.carbohidrato.join(", ")||"avena, arroz, patata"}
Grasas: ${porRol.grasa.join(", ")||"aceite de oliva"}
Verduras: ${porRol.verdura.join(", ")||"brócoli, espinaca"}
Fruta: ${porRol.fruta.join(", ")||"plátano, manzana"}
${restr.length?`Restricciones: ${restr.join(", ")}`:""}
Objetivos kcal:
${kcalStr}`;

  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:2000,system:sys,messages:[{role:"user",content:msg}]})
  });
  if(!res.ok)throw new Error(`API ${res.status}`);
  const data=await res.json();
  const txt=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").replace(/```json|```/g,"").trim();
  const parsed=JSON.parse(txt);

  // Mapear respuesta de la IA a estructura interna
  const comidasIA={};
  Object.entries(parsed).forEach(([c,ops])=>{
    comidasIA[c]=(ops||[]).map(op=>({
      nombre:op.n,
      descripcion:op.desc,
      ingredientes:(op.i||[]).map(ing=>({nombre:ing.n,gramos:ing.g,ref:ing.r,macroLabel:ing.m})),
      guardado:false,
    }));
  });

  // Recalcular gramos desde BD para garantizar exactitud de macros
  const comidasFinales=recalcularGramos(comidasIA,macros);

  return{nombre:diaNombre,comidas:comidasFinales};
}

async function llamarClaudeBasico(messages,system){
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,system,messages})

async function adaptarRecetaTexto(texto, macros, kcalObj, alimentosDisponibles){
  // La IA solo decide: nombre + twists + qué alimento de nuestra BD usar para cada rol
  // Los gramos los calculamos nosotros → respuesta corta, sin web_search
  const comida_kcal = Math.round(kcalObj * 0.35);
  const listaP  = alimentosDisponibles.filter(a=>a.rol==="proteina"   ).map(a=>a.n).join(", ");
  const listaC  = alimentosDisponibles.filter(a=>a.rol==="carbohidrato").map(a=>a.n).join(", ");
  const listaG  = alimentosDisponibles.filter(a=>a.rol==="grasa"       ).map(a=>a.n).join(", ");
  const listaV  = alimentosDisponibles.filter(a=>a.rol==="verdura"     ).map(a=>a.n).join(", ");

  const sys = `Eres nutricionista. Respondes SOLO en JSON sin markdown.
Formato exacto (sin campos extra):
{"nombre":"nombre del plato adaptado","twists":["cambio 1","cambio 2","cambio 3"],"p":"nombre exacto de la proteína","c":"nombre exacto del carbohidrato","g":"nombre exacto de la grasa","v":"nombre exacto de la verdura"}
Los valores de p/c/g/v deben ser nombres EXACTOS de las listas que te doy. Si ninguno encaja, elige el más parecido.`;

  const msg = `Receta original:
${texto.slice(0, 1500)}

Adapta esta receta a ${comida_kcal} kcal (para una comida principal).
Elige UN alimento de cada lista para construir la versión saludable:
- Proteínas disponibles: ${listaP}
- Carbohidratos disponibles: ${listaC}
- Grasas disponibles: ${listaG}
- Verduras disponibles: ${listaV}

Sugiere 3 twists: cambios concretos para hacerla más sana (ej: "Sustituye la nata por yogur griego 0% — misma cremosidad, menos grasa").`;

  const txt = await llamarClaudeBasico([{role:"user",content:msg}], sys);
  const r = JSON.parse(txt.replace(/```json|```/g,"").trim());

  // Calcular gramos desde BD para cada rol
  function grDesde(nombreBD, rol, target){
    const al = alimentosDisponibles.find(a=>a.rol===rol && a.n===nombreBD);
    if(!al) return {nombre:nombreBD, gramos:null, ref:"al gusto", macroLabel:""};
    const macro = rol==="proteina" ? al.p : rol==="carbohidrato" ? al.c : al.g;
    const gramos = macro>0 ? Math.round((target/macro)*100) : null;
    return {nombre:nombreBD, gramos, ref:al.ref||"tal cual", macroLabel:
      rol==="proteina"   ? `${Math.round(target)}g prot.` :
      rol==="carbohidrato"? `${Math.round(target)}g carbo` :
                            `${Math.round(target)}g grasa`};
  }

  const tP = macros.proteina * 0.35;
  const tC = macros.carbohidrato * 0.35;
  const tG = macros.grasa * 0.35;

  return {
    nombre: r.nombre,
    twists: r.twists || [],
    ingredientes: [
      grDesde(r.p, "proteina",    tP),
      grDesde(r.c, "carbohidrato",tC),
      grDesde(r.g, "grasa",       tG),
      {nombre: r.v||"Verdura al gusto", gramos:null, ref:"al gusto", macroLabel:"libre"},
    ].filter(i=>i.nombre),
    kcal: Math.round(tP*4 + tC*4 + tG*9),
  };
}

/* Recalcula los gramos de cada ingrediente usando la BD nutricional.
   La IA elige QUÉ alimentos usar; nosotros calculamos CUÁNTO hace falta
   para cumplir exactamente el objetivo de proteína/carbo/grasa de esa comida. */
function recalcularGramos(comidasIA, macros) {
  const resultado = {};
  COMIDAS_DIA.forEach(c => {
    const pct = REPARTO_KCAL[c] || 0.2;
    const tP  = macros.proteina      * pct;
    const tC  = macros.carbohidrato  * pct;
    const tG  = macros.grasa         * pct;

    resultado[c] = (comidasIA[c] || []).map(op => {
      let protAsignada = false, carboAsignado = false, grasaAsignada = false;

      const ingredientesCalc = (op.ingredientes || []).map(ing => {
        let alBD = null; let grupoBD = null;
        for (const gr of GRUPOS) {
          const encontrado = gr.alimentos.find(a => {
            const nb = (a.n || '').toLowerCase();
            const ni = (ing.nombre || '').toLowerCase();
            return nb === ni || nb.includes(ni) || ni.includes(nb);
          });
          if (encontrado) { alBD = encontrado; grupoBD = gr; break; }
        }
        if (!alBD) return ing;

        let gramos = ing.gramos;

        if (grupoBD.rol === 'proteina' && alBD.p > 0 && !protAsignada) {
          gramos = Math.round((tP / alBD.p) * 100);
          protAsignada = true;
        } else if (grupoBD.rol === 'carbohidrato' && alBD.c > 0 && !carboAsignado) {
          gramos = Math.round((tC / alBD.c) * 100);
          carboAsignado = true;
        } else if (grupoBD.rol === 'grasa' && alBD.g > 0 && !grasaAsignada) {
          gramos = Math.round((tG / alBD.g) * 100);
          grasaAsignada = true;
        } else if (grupoBD.rol === 'verdura') {
          return { ...ing, gramos: null, ref: alBD.ref || ing.ref, macroLabel: 'al gusto', macrosTodos: null };
        } else if (grupoBD.rol === 'fruta') {
          return { ...ing, gramos: null, ref: alBD.ref || ing.ref, macroLabel: '1 pieza', macrosTodos: null };
        }

        // Calcular TODOS los macros reales para los gramos asignados
        const f = (gramos || 0) / 100;
        const macrosTodos = {
          p:    Math.round(alBD.p    * f),
          c:    Math.round(alBD.c    * f),
          g:    Math.round(alBD.g    * f),
          kcal: Math.round(alBD.kcal * f),
        };

        return { ...ing, gramos, ref: alBD.ref || ing.ref, macroLabel: '', macrosTodos };
      });

      return { ...op, ingredientes: ingredientesCalc };
    });
  });
  return resultado;
}

/* ═══════════════════════════════════════════
   GRÁFICA DE PROGRESO
═══════════════════════════════════════════ */
function GraficaProgreso({entradas}){
  const[detalle,setDetalle]=useState(null);
  if(!entradas||entradas.length<2)return(
    <div className="rounded-xl bg-stone-50 border border-stone-200 p-4 text-center text-sm text-stone-400">
      Registra al menos 2 mediciones para ver tu tendencia aquí 📊
    </div>
  );
  const n=entradas.length, W=560, H=110, pad=36;
  const xs=entradas.map((_,i)=>pad+(i/(n-1))*(W-pad*2));
  const mapa={"↓":H-16,"→":H/2,"↑":16};
  const points=entradas.map((e,i)=>({x:xs[i],y:mapa[e.simbolo]||H/2,...e}));
  const pathD=points.map((p,i)=>`${i===0?"M":"L"} ${p.x} ${p.y}`).join(" ");
  return(
    <div>
      <p className="text-xs text-stone-400 mb-2">Toca un punto para ver el dato exacto.</p>
      <svg viewBox={`0 0 ${W} ${H+28}`} className="w-full">
        <path d={pathD} fill="none" stroke="#d1fae5" strokeWidth="2"/>
        {points.map((p,i)=>(
          <g key={i} onClick={()=>setDetalle(detalle?.i===i?null:{...p,i})} className="cursor-pointer">
            <circle cx={p.x} cy={p.y} r="15" fill={p.simbolo==="↓"?"#d1fae5":p.simbolo==="→"?"#fef3c7":"#fee2e2"} stroke={p.simbolo==="↓"?"#10b981":p.simbolo==="→"?"#f59e0b":"#ef4444"} strokeWidth="1.5"/>
            <text x={p.x} y={p.y+5} textAnchor="middle" fontSize="13" fill={p.simbolo==="↓"?"#059669":p.simbolo==="→"?"#d97706":"#dc2626"}>{p.simbolo}</text>
            <text x={p.x} y={H+22} textAnchor="middle" fontSize="9" fill="#a8a29e">{new Date(p.fecha).toLocaleDateString("es-ES",{day:"2-digit",month:"2-digit"})}</text>
          </g>
        ))}
      </svg>
      {detalle&&(
        <div className="mt-2 rounded-xl bg-stone-50 border border-stone-200 p-3 text-sm">
          <span className="font-medium">{new Date(detalle.fecha).toLocaleDateString("es-ES",{day:"2-digit",month:"long"})}</span>
          <span className="ml-2 text-stone-500">
            Peso: {detalle.peso} kg · IMC: {detalle.imc?.toFixed(1)}{detalle.grasa!=null?` · Grasa: ${detalle.grasa.toFixed(1)}%`:""}
          </span>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════
   CARD DE PLATO
═══════════════════════════════════════════ */
function calcularMacrosPlato(ingredientes){
  let p=0,c=0,g=0,kcal=0;
  (ingredientes||[]).forEach(ing=>{
    if(ing.macrosTodos){
      p+=ing.macrosTodos.p; c+=ing.macrosTodos.c;
      g+=ing.macrosTodos.g; kcal+=ing.macrosTodos.kcal;
    } else if(ing.gramos) {
      // fallback: buscar en BD
      for(const grupo of GRUPOS){
        const al=grupo.alimentos.find(a=>(a.n||"").toLowerCase()===(ing.nombre||"").toLowerCase());
        if(al){const f=ing.gramos/100; p+=al.p*f; c+=al.c*f; g+=al.g*f; kcal+=al.kcal*f; break;}
      }
    }
  });
  return{p:Math.round(p),c:Math.round(c),g:Math.round(g),kcal:Math.round(kcal)};
}

function PlatoCard({opcion,onGuardar}){
  const[exp,setExp]=useState(false);
  if(!opcion)return null;
  const totales=calcularMacrosPlato(opcion.ingredientes);
  return (
    <div className="rounded-xl border border-stone-200 bg-white overflow-hidden">
      <div className="p-4">
        <p className="font-serif text-base text-stone-900 leading-snug">{opcion.nombre||"Plato del día"}</p>
        {opcion.descripcion&&(

        )}
        {/* Resumen de macros calculado desde BD */}
        <div className="flex gap-3 mt-2 text-xs">
          <span className="text-rose-600 font-medium">{totales.p}g prot.</span>
          <span className="text-sky-600 font-medium">{totales.c}g carbo</span>
          <span className="text-amber-600 font-medium">{totales.g}g grasa</span>
          <span className="text-stone-400">{totales.kcal} kcal</span>
        </div>
        <div className="flex gap-2 mt-3 flex-wrap">
          <button onClick={()=>setExp(!exp)} className="rounded-full border border-stone-200 px-3 py-1 text-xs text-stone-500 hover:border-emerald-300 transition">
            {exp?"▲ Ocultar":"▼ Ingredientes y cantidades"}
          </button>
          <button onClick={onGuardar} className={`rounded-full border px-3 py-1 text-xs transition ${opcion.guardado?"border-rose-300 bg-rose-50 text-rose-600":"border-stone-200 text-stone-500 hover:border-rose-300 hover:text-rose-500"}`}>
            {opcion.guardado?"♥ Guardada":"♡ Guardar receta"}
          </button>
        </div>
      </div>
      {exp&&(
        <div className="border-t border-stone-100 bg-stone-50 px-4 py-3">
          <ul className="space-y-2">
            {(opcion.ingredientes||[]).map((ing,i)=>{
              const nombre = ing.nombre||ing.n||"";
              const ref    = ing.ref||"";
              const gramos = ing.gramos;
              const m      = ing.macrosTodos;
              return(
                <li key={i}>
                  <div className="flex justify-between text-sm">
                    <span className="text-stone-700 font-medium">
                      {nombre}
                      {gramos
                        ? <span className="text-stone-400 font-normal"> — {gramos} g <span className="text-xs">({ref})</span></span>
                        : <span className="text-stone-400 font-normal"> — {ing.macroLabel||ref}</span>
                      }
                    </span>
                    {m && <span className="text-xs text-stone-400 shrink-0 ml-2">{m.kcal} kcal</span>}
                  </div>
                  {m && (
                    <div className="flex gap-3 mt-0.5 text-xs">
                      {m.p>0  && <span className="text-rose-500">{m.p}g prot</span>}
                      {m.c>0  && <span className="text-sky-500">{m.c}g carbo</span>}
                      {m.g>0  && <span className="text-amber-500">{m.g}g grasa</span>}
                    </div>
                  )}
                </li>
              );
            })}
          </ul>
        </div>
      )}
    </div>
  );
}

                            <span className="font-medium text-stone-700">{label}</span>
                            <span className={`${ok?"text-emerald-600":cerca?"text-amber-600":"text-rose-500"}`}>
                              {real}{unit} / {obj}{unit} <span className="text-stone-400">· {msg}</span>
                            </span>
                          </div>
                          <div className="h-2 w-full rounded-full bg-stone-100 overflow-hidden">
                            <div className={`h-full rounded-full transition-all ${barColor}`} style={{width:`${Math.min(pct,100)}%`}}/>
                          </div>
                        </div>
                      );
                    })}
                    <p className="text-xs text-stone-400 pt-1">
                      Cambia entre Opción 1 y 2 en cada comida para ajustar el total. Un día no define nada — lo que cuenta es la tendencia de la semana.
                    </p>
                  </div>
                )}
              </div>
            )}
          </Card>
          <NavButtons prev={goPrev} next={goNext}/>
        </>}

        {/* ══ RECETARIO ══ */}
        {tab==="recetario"&&<>
          <Card cls="bg-gradient-to-br from-rose-50 to-stone-50 border-rose-100">
            <p className="text-sm text-rose-900 leading-relaxed">
              Tu recetario personal 📖 Guarda platos del menú, adapta recetas de internet a tus macros y añade notas. Tu libro de cocina saludable, construido por ti.
            </p>
          </Card>

          <Card>
            <h3 className="font-serif text-base text-stone-900">🥘 Adaptar una receta a tus macros</h3>
            <Expl>Copia y pega el texto de cualquier receta (ingredientes + elaboración). La analizo, sugiero 3 cambios para hacerla más sana y te doy las cantidades exactas para tus macros — sin tener que buscar en internet.</Expl>
            <textarea
              className="mt-3 w-full rounded-xl border border-stone-300 bg-stone-50 px-3 py-2 text-sm text-stone-800 focus:border-rose-400 focus:outline-none resize-none"
              rows={5}
              placeholder={"Pega aquí el texto de la receta:\n\nEj: Macarrones a la boloñesa\nIngredientes: 200g pasta, 150g carne picada, 1 cebolla, tomate frito, aceite…\nPreparación: sofreír la cebolla…"}
              value={textoReceta}
              onChange={e=>{setTextoReceta(e.target.value);setErrorReceta("");}}
            />
            <button
              onClick={handleAdaptarTexto}
              disabled={!textoReceta.trim()||cargandoURL||!datosOk}
              className="mt-2 rounded-full bg-rose-600 px-5 py-2 text-sm font-medium text-white hover:bg-rose-700 disabled:opacity-40 transition"
            >
              {cargandoURL?"Analizando... ✨":"Adaptar a mis macros"}
            </button>
            {!datosOk&&<p className="mt-1 text-xs text-amber-600">Primero rellena tus datos en "Tu objetivo" para que pueda calcular cantidades.</p>}
            {errorReceta&&<p className="mt-2 text-xs text-rose-600 bg-rose-50 border border-rose-200 rounded-lg px-3 py-2">{errorReceta}</p>}

            {recetaAdaptada&&(
              <div className="mt-4 rounded-xl border border-rose-200 bg-rose-50 p-4 space-y-3">
                <p className="font-serif text-base text-stone-900">{recetaAdaptada.nombre}</p>

                {recetaAdaptada.twists?.length>0&&(
                  <div>
                    <p className="text-xs font-semibold text-rose-700 mb-1.5">💡 3 cambios para hacerla más sana</p>
                    <ul className="space-y-1">
                      {recetaAdaptada.twists.map((t,i)=>(
                        <li key={i} className="text-xs text-stone-700 flex gap-1.5">
                          <span className="text-rose-400 shrink-0">•</span>{t}
                        </li>
                      ))}
                    </ul>
                  </div>
                )}

                {recetaAdaptada.ingredientes?.length>0&&(
                  <div>
                    <p className="text-xs font-semibold text-stone-700 mb-1.5">Cantidades para tus macros (~{recetaAdaptada.kcal} kcal)</p>
                    <ul className="space-y-1">
                      {recetaAdaptada.ingredientes.map((ing,i)=>(
                        <li key={i} className="flex justify-between text-xs">
                          <span className="text-stone-700">
                            {ing.nombre}
                            {ing.gramos?<span className="text-stone-400"> — {ing.gramos}g ({ing.ref})</span>:<span className="text-stone-400"> — {ing.ref}</span>}
                          </span>
                          <span className="text-stone-400 ml-3 shrink-0">{ing.macroLabel}</span>
                        </li>
                      ))}
                    </ul>
                  </div>
                )}

                <div className="flex gap-2">
                  <button onClick={guardarRecetaAdaptada} className="rounded-full bg-emerald-700 px-4 py-1.5 text-xs font-medium text-white hover:bg-emerald-800 transition">Guardar en mi recetario ♥</button>
                  <button onClick={()=>setRecetaAdaptada(null)} className="rounded-full border border-stone-300 px-4 py-1.5 text-xs text-stone-500 hover:border-stone-400 transition">Descartar</button>
                </div>
              </div>
            )}
          </Card>

          {recetario.length===0?(
            <Card>
              <p className="text-center text-stone-400 text-sm py-6">Tu recetario está vacío 🌱<br/><span className="text-xs">Guarda platos desde el menú o adapta recetas de internet.</span></p>
            </Card>
          ):(
            <div className="space-y-4">
              <h3 className="font-serif text-base text-stone-800 px-1">Mis recetas guardadas ({recetario.length})</h3>
              {recetario.map(r=>(
                <Card key={r.id}>
                  <div className="flex items-start justify-between gap-2">
                    <div>
                      <p className="font-serif text-sm text-stone-900">{r.nombreComida}</p>
                      <div className="flex gap-2 mt-0.5 flex-wrap">
                        <span className="text-xs text-stone-400">{r.nombreDia} · {r.fecha}</span>
                        {r.kcal&&<span className="text-xs text-amber-600 font-medium">{r.kcal} kcal</span>}
                      </div>
                    </div>
                    <button onClick={()=>setVerReceta(verReceta===r.id?null:r.id)} className="text-xs text-stone-400 hover:text-stone-700 border border-stone-200 rounded-full px-2 py-0.5 shrink-0">{verReceta===r.id?"▲ Ocultar":"▼ Ver"}</button>
                  </div>


                  {verReceta===r.id&&(
                    <div className="mt-3 space-y-3 border-t border-stone-100 pt-3">

                      {/* Twists / mejoras */}
                      {r.twists?.length>0&&(
                        <div>
                          <p className="text-xs font-semibold text-rose-700 mb-1">💡 Mejoras aplicadas</p>
                          <ul className="space-y-1">
                            {r.twists.map((t,i)=>(
                              <li key={i} className="text-xs text-stone-600 flex gap-1.5">
                                <span className="text-rose-400 shrink-0">•</span>{t}
                              </li>
                            ))}
                          </ul>
                        </div>
                      )}

                      {/* Ingredientes con macros */}
                      {r.ingredientes?.length>0&&(
                        <div>
                          <p className="text-xs font-semibold text-stone-700 mb-1">Ingredientes adaptados</p>
                          <ul className="space-y-1">{r.ingredientes.map((ing,i)=>(
                            <li key={i} className="flex justify-between text-xs">
                              <span className="text-stone-700">
                                {ing.n||ing.nombre}
                                {ing.gramos?<span className="text-stone-400"> — {ing.gramos}g ({ing.ref})</span>:<span className="text-stone-400"> — {ing.ref}</span>}
                              </span>
                              <span className="text-stone-400 ml-2 shrink-0">{ing.macroLabel||ing.macro_label||""}</span>
                            </li>
                          ))}</ul>
                        </div>
                      )}

                      {/* Texto original colapsable */}
                      {r.textoOriginal&&(
                        <details className="text-xs">
                          <summary className="cursor-pointer text-stone-400 hover:text-stone-600 select-none">Ver receta original</summary>
                          <pre className="mt-2 whitespace-pre-wrap text-stone-500 bg-stone-50 rounded-lg p-3 leading-relaxed">{r.textoOriginal}</pre>
                        </details>
                      )}

                      {/* Descripción (platos del menú) */}
                      {r.descripcion&&!r.twists?.length&&(
                        <p className="text-xs italic text-stone-500">{r.descripcion}</p>
                      )}

                      <div>
                        <Lbl>Mis notas</Lbl>
                        <textarea className="w-full rounded-lg border border-stone-300 bg-stone-50 px-3 py-2 text-sm text-stone-700 focus:border-rose-400 focus:outline-none resize-none" rows={2} placeholder="Cómo te quedó, qué cambiarías…" value={notaActual[r.id]??r.nota} onChange={e=>setNotaActual(p=>({...p,[r.id]:e.target.value}))} onBlur={e=>{const nota=e.target.value;setRecetario(prev=>prev.map(x=>x.id===r.id?{...x,nota}:x));}}/>
                      </div>
                      <button onClick={()=>setRecetario(prev=>prev.filter(x=>x.id!==r.id))} className="text-xs text-rose-500 hover:text-rose-700 transition">Eliminar receta</button>
                    </div>
                  )}
                </Card>
              ))}
            </div>
          )}
          <NavButtons prev={goPrev}/>
        </>}

      </main>

      <footer className="mx-auto max-w-3xl px-4 pb-8 pt-2">
        <p className="text-xs text-stone-400">Esta herramienta usa fórmulas estándar de nutrición (Mifflin-St Jeor, Hodgdon-Beckett) y es orientativa. No sustituye la valoración de un profesional de la salud.</p>
      </footer>
    </div>
  );
}

    // ── Montar la app ──────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(App));
  </script>
</body>
</html>
