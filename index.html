function claseGI(gi) {

// IG ponderado del plato: promedio de GI de sus ingredientes pesado por gramos de carbo
function calcularGIPlato(ingredientes) {
  let sumCxGI = 0,
    sumC = 0;
  (ingredientes || []).forEach(ing => {
    const gi = getGI(ing.id);
    const carboG = ing.macrosTodos?.c ?? 0;
    if (gi !== null && carboG > 2) {
      sumCxGI += gi * carboG;
      sumC += carboG;
    }
  });
  return sumC > 0 ? Math.round(sumCxGI / sumC) : null;
}

function calcTMB(sexo, peso, altura, edad) {
  const b = 10 * peso + 6.25 * altura - 5 * edad;
  return sexo === "hombre" ? b + 5 : b - 161;
}
// TDEE con horas de deporte:
// Base sedentaria (1.2) = NEAT mínimo para funciones básicas del día
